<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Review Chi Tiết - Linh Phim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <ul id="menu"><li><a href="index.html">🏠 Về Trang Chủ</a></li></ul>
    <div class="detail-container">
        
        <div class="movie-info-flex">
            <div class="poster-side"><img id="poster-phim" src="" alt="Poster"></div>
            <div class="text-side">
                <h1 id="ten-phim" style="color:#d14781;"></h1>
                <div id="star-rating" class="rating"></div>
                <p><strong>🎬 Đạo diễn:</strong> <span id="dao-dien"></span></p>
                <p><strong>📅 Năm:</strong> <span id="ngay-ra-mat"></span></p>
                <p><strong>🔢 Số tập:</strong> <span id="so-tap"></span></p>
                <p><strong>📝 Mô tả:</strong> <span id="mo-ta"></span> <span id="btn-xem-them" onclick="toggleMoTa()" style="color:#d14781; cursor:pointer; font-weight:bold;"></span></p>
                <div class="review-box" style="background:#fffafa; padding:15px; border-left:5px solid #ffc1cc; border-radius:10px; margin-top:20px;">
                    <h3 style="margin-top:0;">✍️ Cảm nhận:</h3>
                    <p id="danh-gia-phim" style="font-style:italic; margin-bottom:0;"></p>
                </div>
            </div>
        </div>

        <div class="trailer-section" style="margin-top: 50px; text-align: center;">
            <h2 style="color: #d14781;">🍿 Trailer Phim 🍿</h2>
            <div style="width: 100%; max-width: 800px; margin: 0 auto; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(255, 193, 204, 0.5); border: 5px solid #ffe4e1; aspect-ratio: 16/9; background: #000;">
          <video id="phim-trailer" src="" style="width: 100%; height: 100%; border-radius: 15px;" controls></video>
            </div>
        </div>

        <h2 style="text-align:center; color:#d14781; margin-top:40px;">✨ Diễn Viên Chính ✨</h2>
        <div id="actor-list" class="actor-list" style="display:flex; justify-content:center; gap:50px;"></div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
