<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông Tin Diễn Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <ul id="menu"><li><a href="index.html">🏠 Về Trang Chủ</a></li></ul>
    <div class="detail-container">
        <div class="movie-info-flex">
            <div class="poster-side"><img id="actor-img" src="" style="border-radius:50%; width:250px; height:250px; object-fit:cover; border:5px solid #ffc1cc;"></div>
            <div class="text-side">
                <h1 id="actor-name" style="color:#d14781;"></h1>
                <hr style="border:1px dashed #ffc1cc;">
                <p><strong>📅 Ngày sinh:</strong> <span id="actor-dob"></span></p>
                <p><strong>📏 Chiều cao:</strong> <span id="actor-height"></span></p>
                <p><strong>📜 MXH: </strong></p>
                <p id="actor-bio" style="line-height:1.6; text-align:justify;"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
